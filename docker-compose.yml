services:
  db:
    image: mysql:8.0
    pull_policy: always
    container_name: stones-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stones
      MYSQL_USER: stones
      MYSQL_PASSWORD: stones
    ports:
      - "3307:3306"
    volumes:
      - stones_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ustones -pstones --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: stones-runtime:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stones-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://stones:stones@db:3306/stones?connection_limit=20&pool_timeout=30
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      PORT: 3001
      CLIENT_URL: http://localhost:3001
    ports:
      - "3001:3001"
    volumes:
      - stones_uploads:/app/public/uploads
      - stones_video_jobs:/app/storage/video-jobs
      - stones_video_exports:/app/storage/video-export

  video-processor:
    image: stones-runtime:local
    pull_policy: never
    container_name: stones-video-processor
    restart: unless-stopped
    command: ["npm", "run", "video-processor"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://stones:stones@db:3306/stones?connection_limit=20&pool_timeout=30
      VIDEO_PROCESSOR_POLL_MS: 3000
    volumes:
      - stones_uploads:/app/public/uploads
      - stones_video_jobs:/app/storage/video-jobs
      - stones_video_exports:/app/storage/video-export

volumes:
  stones_mysql_data:
  stones_uploads:
  stones_video_jobs:
  stones_video_exports:
