x-runtime-build: &runtime-build
  context: .
  dockerfile: Dockerfile
  args:
    VITE_VIDEO_HELPER_DOWNLOAD_URL: ${VITE_VIDEO_HELPER_DOWNLOAD_URL:-}

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging: *json-logging

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - stones_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *json-logging

  app:
    image: stones-runtime:prod
    build: *runtime-build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      CLIENT_URL: ${CLIENT_URL:?CLIENT_URL is required}
      PORT: ${PORT:-3001}
      RUN_MIGRATIONS: "1"
      NODE_ENV: production
    volumes:
      - stones_uploads:/app/public/uploads
      - stones_video_jobs:/app/storage/video-jobs
      - stones_video_exports:/app/storage/video-export
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3001') + '/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    logging: *json-logging

  video-processor:
    image: stones-runtime:prod
    build: *runtime-build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["node", "build/server/videoProcessor.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      VIDEO_PROCESSOR_POLL_MS: ${VIDEO_PROCESSOR_POLL_MS:-3000}
      RUN_MIGRATIONS: "0"
      NODE_ENV: production
    volumes:
      - stones_uploads:/app/public/uploads
      - stones_video_jobs:/app/storage/video-jobs
      - stones_video_exports:/app/storage/video-export
    healthcheck:
      test: ["CMD-SHELL", "ps -o args | grep -q '[n]ode build/server/videoProcessor.js'"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *json-logging

volumes:
  caddy_config:
  caddy_data:
  stones_mysql_data:
  stones_uploads:
  stones_video_jobs:
  stones_video_exports:
