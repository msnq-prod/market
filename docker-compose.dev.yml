services:
  db:
    image: mysql:8.0
    pull_policy: always
    container_name: stones-dev-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stones
      MYSQL_USER: stones
      MYSQL_PASSWORD: stones
    ports:
      - "3307:3306"
    volumes:
      - stones_dev_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ustones -pstones --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:22
    container_name: stones-dev-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://stones:stones@db:3306/stones?connection_limit=20&pool_timeout=30
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev-access-token-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-token-secret}
      TELEGRAM_TOKEN_ENCRYPTION_KEY: ${TELEGRAM_TOKEN_ENCRYPTION_KEY:-dev-telegram-token-encryption-key}
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_API_TARGET: http://127.0.0.1:3001
      VITE_USE_POLLING: "1"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    ports:
      - "3001:3001"
      - "5173:5173"
    volumes:
      - .:/app
      - stones_dev_node_modules:/app/node_modules
      - stones_dev_uploads:/app/public/uploads
      - stones_dev_video_jobs:/app/storage/video-jobs
      - stones_dev_video_exports:/app/storage/video-export
    command: >
      sh -lc "npm install --no-audit --no-fund
      && npm run prisma:generate
      && npm run dev"

volumes:
  stones_dev_mysql_data:
  stones_dev_node_modules:
  stones_dev_uploads:
  stones_dev_video_jobs:
  stones_dev_video_exports:
