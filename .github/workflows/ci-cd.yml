name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stones-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STONES_PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ vars.STONES_PROD_SSH_HOST }}
          SSH_PORT: ${{ vars.STONES_PROD_SSH_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy revision on server
        env:
          DEPLOY_HOST: ${{ vars.STONES_PROD_SSH_HOST }}
          DEPLOY_PORT: ${{ vars.STONES_PROD_SSH_PORT }}
          DEPLOY_USER: ${{ vars.STONES_PROD_SSH_USER }}
          DEPLOY_DIR: ${{ vars.STONES_PROD_APP_DIR }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_DIR"

          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_DIR' && ./scripts/ops/deploy-revision.sh '$GITHUB_SHA'"
